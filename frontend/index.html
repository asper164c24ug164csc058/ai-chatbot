<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bg-glow { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 60% 40%, rgba(120,40,200,0.15) 0%, transparent 60%), radial-gradient(ellipse at 20% 80%, rgba(40,100,255,0.1) 0%, transparent 50%); pointer-events: none; }
        .chat-wrapper { width: 95%; max-width: 700px; height: 90vh; display: flex; flex-direction: column; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05); }
        .chat-header { padding: 20px 24px; background: linear-gradient(135deg, rgba(120,40,200,0.3), rgba(40,100,255,0.2)); border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 14px; }
        .header-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #7828c8, #2864ff); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 15px rgba(120,40,200,0.4); }
        .header-info h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #fff, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-info p { font-size: 12px; color: #6ee7b7; font-weight: 500; display: flex; align-items: center; gap: 5px; }
        .header-info p::before { content: ''; width: 7px; height: 7px; background: #6ee7b7; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.2)} }
        .chat-box { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .message-row { display: flex; align-items: flex-end; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .message-row.user { flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .avatar.bot { background: linear-gradient(135deg, #7828c8, #2864ff); }
        .avatar.user { background: linear-gradient(135deg, #f43f5e, #fb923c); }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
        .message.bot { background: rgba(120,40,200,0.15); border: 1px solid rgba(120,40,200,0.2); border-bottom-left-radius: 4px; color: #e2e8f0; }
        .message.user { background: linear-gradient(135deg, #7828c8, #2864ff); border-bottom-right-radius: 4px; color: #fff; box-shadow: 0 4px 15px rgba(120,40,200,0.3); }
        .message.loading { background: rgba(120,40,200,0.1); border: 1px solid rgba(120,40,200,0.15); color: #a78bfa; }
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing-dots span { width: 6px; height: 6px; background: #a78bfa; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
        .timestamp { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; text-align: right; }
        .message-row.bot-row .timestamp { text-align: left; }
        .input-area { padding: 16px 20px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 12px; align-items: center; }
        #user-input { flex: 1; padding: 14px 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; }
        #user-input:focus { border-color: rgba(120,40,200,0.5); background: rgba(255,255,255,0.08); box-shadow: 0 0 0 3px rgba(120,40,200,0.1); }
        #user-input::placeholder { color: rgba(255,255,255,0.3); }
        #send-btn { width: 48px; height: 48px; background: linear-gradient(135deg, #7828c8, #2864ff); border: none; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 4px 15px rgba(120,40,200,0.3); flex-shrink: 0; }
        #send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(120,40,200,0.5); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        #send-btn svg { width: 20px; height: 20px; fill: white; }
        .welcome-msg { text-align: center; padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="header-avatar">??</div>
            <div class="header-info">
                <h1>AI Assistant</h1>
                <p>Online — Powered by Groq</p>
            </div>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="welcome-msg">Start a conversation below</div>
            <div class="message-row">
                <div class="avatar bot">??</div>
                <div>
                    <div class="message bot">Hello! I am your AI assistant powered by Groq. Ask me anything!</div>
                    <div class="timestamp">Just now</div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask me anything..." />
            <button id="send-btn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
    <script>
        const API_URL = 'https://ai-chatbot-production-a994.up.railway.app';
        let session_id = null;

        function getTime() {
            return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-btn');
            const message = input.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            input.value = '';
            sendBtn.disabled = true;

            const loadingRow = appendLoading();

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id })
                });
                const data = await res.json();
                session_id = data.session_id;
                loadingRow.remove();
                appendMessage(data.response, 'bot');
            } catch (err) {
                loadingRow.remove();
                appendMessage('Sorry, I could not connect to the server. Please try again.', 'bot');
            }
            sendBtn.disabled = false;
            input.focus();
        }

        function appendMessage(text, type) {
            const chatBox = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = `message-row ${type === 'user' ? 'user' : ''}`;
            const avatar = document.createElement('div');
            avatar.className = `avatar ${type}`;
            avatar.textContent = type === 'user' ? '??' : '??';
            const wrapper = document.createElement('div');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            const time = document.createElement('div');
            time.className = 'timestamp';
            time.textContent = getTime();
            wrapper.appendChild(msg);
            wrapper.appendChild(time);
            row.appendChild(avatar);
            row.appendChild(wrapper);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return row;
        }

        function appendLoading() {
            const chatBox = document.getElementById('chat-box');
            const row = document.createElement('div');
            row.className = 'message-row';
            const avatar = document.createElement('div');
            avatar.className = 'avatar bot';
            avatar.textContent = '??';
            const wrapper = document.createElement('div');
            const msg = document.createElement('div');
            msg.className = 'message loading';
            msg.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
            wrapper.appendChild(msg);
            row.appendChild(avatar);
            row.appendChild(wrapper);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
            return row;
        }

        document.getElementById('user-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
