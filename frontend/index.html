<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: #050510; color: #fff; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .chat-wrapper { position: relative; z-index: 1; width: 95%; max-width: 720px; height: 90vh; display: flex; flex-direction: column; background: rgba(10,10,30,0.85); backdrop-filter: blur(30px); border: 1px solid rgba(100,100,255,0.15); border-radius: 28px; overflow: hidden; box-shadow: 0 0 60px rgba(80,40,255,0.15), 0 25px 50px rgba(0,0,0,0.6); }
        .chat-header { padding: 18px 24px; background: linear-gradient(135deg, rgba(80,40,255,0.3), rgba(180,40,255,0.2)); border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 14px; }
        .header-icon { width: 46px; height: 46px; background: linear-gradient(135deg, #5028ff, #b428ff); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #fff; box-shadow: 0 0 20px rgba(80,40,255,0.5); animation: iconPulse 3s ease-in-out infinite; }
        @keyframes iconPulse { 0%,100%{box-shadow:0 0 20px rgba(80,40,255,0.5)} 50%{box-shadow:0 0 40px rgba(180,40,255,0.8)} }
        .header-text h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #fff 0%, #b4a8ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px; }
        .status { font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 6px; font-weight: 500; }
        .status-dot { width: 7px; height: 7px; background: #4ade80; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
        .chat-box { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
        .chat-box::-webkit-scrollbar { width: 3px; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(100,100,255,0.3); border-radius: 3px; }
        .msg-row { display: flex; gap: 10px; align-items: flex-end; animation: msgSlide 0.35s cubic-bezier(0.34,1.56,0.64,1); }
        @keyframes msgSlide { from{opacity:0;transform:translateY(20px) scale(0.95)} to{opacity:1;transform:translateY(0) scale(1)} }
        .msg-row.user { flex-direction: row-reverse; }
        .av { width: 34px; height: 34px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.5px; }
        .av.bot { background: linear-gradient(135deg, #5028ff, #b428ff); box-shadow: 0 0 12px rgba(80,40,255,0.4); }
        .av.user { background: linear-gradient(135deg, #f43f5e, #fb923c); box-shadow: 0 0 12px rgba(244,63,94,0.4); }
        .msg-content { max-width: 72%; }
        .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.65; word-wrap: break-word; white-space: pre-wrap; }
        .bubble.bot { background: rgba(80,40,255,0.12); border: 1px solid rgba(80,40,255,0.2); border-bottom-left-radius: 5px; color: #e2e8f0; }
        .bubble.user { background: linear-gradient(135deg, #5028ff, #b428ff); border-bottom-right-radius: 5px; color: #fff; box-shadow: 0 4px 20px rgba(80,40,255,0.35); }
        .bubble.loading { background: rgba(80,40,255,0.08); border: 1px solid rgba(80,40,255,0.15); }
        .dots { display: flex; gap: 5px; padding: 4px 2px; }
        .dots span { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, #5028ff, #b428ff); animation: dotBounce 1.4s infinite ease-in-out; }
        .dots span:nth-child(1){animation-delay:0s}
        .dots span:nth-child(2){animation-delay:0.2s}
        .dots span:nth-child(3){animation-delay:0.4s}
        @keyframes dotBounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-8px);opacity:1} }
        .ts { font-size: 10px; color: rgba(255,255,255,0.25); margin-top: 5px; padding: 0 4px; }
        .msg-row.user .ts { text-align: right; }
        .suggestions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .sug-btn { padding: 7px 13px; background: rgba(80,40,255,0.1); border: 1px solid rgba(80,40,255,0.25); border-radius: 20px; color: #a78bfa; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: "Inter", sans-serif; }
        .sug-btn:hover { background: rgba(80,40,255,0.25); border-color: rgba(80,40,255,0.5); color: #fff; transform: translateY(-1px); }
        .input-area { padding: 14px 18px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; align-items: center; }
        #user-input { flex: 1; padding: 13px 18px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: #fff; font-size: 14px; font-family: "Inter", sans-serif; outline: none; transition: all 0.25s; }
        #user-input:focus { border-color: rgba(80,40,255,0.5); background: rgba(80,40,255,0.08); box-shadow: 0 0 0 3px rgba(80,40,255,0.12), 0 0 20px rgba(80,40,255,0.1); }
        #user-input::placeholder { color: rgba(255,255,255,0.25); }
        #send-btn { width: 46px; height: 46px; background: linear-gradient(135deg, #5028ff, #b428ff); border: none; border-radius: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.25s; box-shadow: 0 4px 15px rgba(80,40,255,0.4); flex-shrink: 0; }
        #send-btn:hover:not(:disabled) { transform: scale(1.08) rotate(5deg); box-shadow: 0 6px 25px rgba(80,40,255,0.6); }
        #send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
        #send-btn svg { width: 18px; height: 18px; fill: white; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="chat-wrapper">
    <div class="chat-header">
        <div class="header-icon">AI</div>
        <div class="header-text">
            <h1>Neural Assistant</h1>
            <div class="status"><span class="status-dot"></span>Online — Groq LLaMA 3.3</div>
        </div>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="msg-row">
            <div class="av bot">AI</div>
            <div class="msg-content">
                <div class="bubble bot">Hello! I am Neural Assistant, powered by Groq LLaMA 3.3. I can help you with anything — coding, writing, math, science, or just a chat!</div>
                <div class="ts">Just now</div>
                <div class="suggestions">
                    <button class="sug-btn" onclick="quickSend(this)">What is AI?</button>
                    <button class="sug-btn" onclick="quickSend(this)">Write a poem</button>
                    <button class="sug-btn" onclick="quickSend(this)">Explain quantum physics</button>
                </div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask me anything..." />
        <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>
<script>
// Particle background
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    dx: (Math.random() - 0.5) * 0.4,
    dy: (Math.random() - 0.5) * 0.4,
    o: Math.random() * 0.5 + 0.1
}));
function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(120, 80, 255, ${p.o})`;
        ctx.fill();
        p.x += p.dx; p.y += p.dy;
        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });
    requestAnimationFrame(drawParticles);
}
drawParticles();
window.addEventListener("resize", () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

const API_URL = "https://ai-chatbot-production-a994.up.railway.app";
let session_id = null;

function getTime() { return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}); }

function quickSend(btn) {
    document.getElementById("user-input").value = btn.textContent;
    sendMessage();
}

async function sendMessage() {
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const message = input.value.trim();
    if (!message) return;
    addMsg(message, "user");
    input.value = "";
    sendBtn.disabled = true;
    const loader = addLoader();
    try {
        const res = await fetch(`${API_URL}/chat`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message, session_id})
        });
        const data = await res.json();
        session_id = data.session_id;
        loader.remove();
        addMsg(data.response, "bot");
    } catch {
        loader.remove();
        addMsg("Connection error. Please try again.", "bot");
    }
    sendBtn.disabled = false;
    input.focus();
}

function addMsg(text, type) {
    const box = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = `msg-row ${type === "user" ? "user" : ""}`;
    const av = document.createElement("div");
    av.className = `av ${type}`;
    av.textContent = type === "user" ? "Me" : "AI";
    const content = document.createElement("div");
    content.className = "msg-content";
    const bubble = document.createElement("div");
    bubble.className = `bubble ${type}`;
    bubble.textContent = text;
    const ts = document.createElement("div");
    ts.className = "ts";
    ts.textContent = getTime();
    content.appendChild(bubble);
    content.appendChild(ts);
    row.appendChild(av);
    row.appendChild(content);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row;
}

function addLoader() {
    const box = document.getElementById("chat-box");
    const row = document.createElement("div");
    row.className = "msg-row";
    const av = document.createElement("div");
    av.className = "av bot";
    av.textContent = "AI";
    const content = document.createElement("div");
    content.className = "msg-content";
    const bubble = document.createElement("div");
    bubble.className = "bubble loading";
    bubble.innerHTML = "<div class='dots'><span></span><span></span><span></span></div>";
    content.appendChild(bubble);
    row.appendChild(av);
    row.appendChild(content);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row;
}

document.getElementById("user-input").addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
